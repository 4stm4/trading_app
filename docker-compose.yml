version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_app}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - trading_net

  backend:
    image: ${BACKEND_IMAGE:-trading-backend:local}
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: trading-backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: ${DB_NAME:-trading_app}
      DB_USER: ${DB_USER:-trading}
      DB_PASSWORD: ${DB_PASSWORD:-trading}
      DB_WAIT_TIMEOUT: "90"
      PORT: "5000"
      DATABASE_URL: postgresql+psycopg://${DB_USER:-trading}:${DB_PASSWORD:-trading}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-trading_app}
      ALEMBIC_DATABASE_URL: postgresql+psycopg://${DB_USER:-trading}:${DB_PASSWORD:-trading}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-trading_app}
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=5)\"",
        ]
      interval: 15s
      timeout: 6s
      retries: 6
    networks:
      - trading_net

  frontend:
    image: ${FRONTEND_IMAGE:-trading-frontend:local}
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: trading-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8050}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks:
      - trading_net

volumes:
  postgres_data:

networks:
  trading_net:
    driver: bridge
